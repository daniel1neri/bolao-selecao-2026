<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
  :root{--verde:#0a7a3e;--verde-claro:#12a855;--amarelo:#f5c800;--azul:#003087;--fundo:#0d1117;--card:#161b22;--borda:#21262d;--texto:#e6edf3;--muted:#7d8590;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--fundo);color:var(--texto);font-family:'Inter',sans-serif;min-height:100vh;}
  header{background:linear-gradient(135deg,var(--verde) 0%,var(--azul) 100%);padding:28px 24px 20px;text-align:center;position:relative;overflow:hidden;}
  header::before{content:'⚽';position:absolute;font-size:200px;opacity:0.05;top:-40px;right:-20px;}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,6vw,3.2rem);letter-spacing:3px;color:var(--amarelo);text-shadow:2px 2px 0 rgba(0,0,0,0.4);}
  header p{font-size:0.8rem;color:rgba(255,255,255,0.6);margin-top:4px;letter-spacing:1px;text-transform:uppercase;}
  .header-actions{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap;}
  .badge{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:5px 14px;font-size:0.78rem;font-weight:600;}
  .btn-reload{background:var(--amarelo);color:#000;border:none;border-radius:20px;padding:7px 18px;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity 0.15s;display:flex;align-items:center;gap:6px;}
  .btn-reload:hover{opacity:0.85;}
  .btn-reload.loading{opacity:0.6;pointer-events:none;}
  .status-bar{background:rgba(0,0,0,0.25);padding:5px 16px;font-size:0.7rem;color:rgba(255,255,255,0.5);text-align:center;}
  .abas{display:flex;background:var(--card);border-bottom:1px solid var(--borda);}
  .aba-btn{flex:1;padding:14px;background:transparent;border:none;color:var(--muted);font-size:0.82rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:0.5px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all 0.15s;}
  .aba-btn:hover{color:var(--texto);}
  .aba-btn.active{color:var(--amarelo);border-bottom-color:var(--amarelo);}
  .placar-geral{display:flex;gap:12px;padding:16px 24px;background:var(--card);border-bottom:1px solid var(--borda);flex-wrap:wrap;justify-content:center;}
  .placar-card{background:var(--fundo);border:1px solid var(--borda);border-radius:10px;padding:12px 20px;text-align:center;min-width:110px;}
  .placar-card .nome{font-size:0.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .placar-card .pts{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--amarelo);line-height:1;}
  .placar-card .label{font-size:0.65rem;color:var(--muted);margin-top:2px;}
  .placar-card.lider{border-color:var(--amarelo);}
  .placar-card.lider .nome{color:var(--amarelo);}
  .filtros{display:flex;gap:8px;overflow-x:auto;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--borda);scrollbar-width:none;}
  .filtros::-webkit-scrollbar{display:none;}
  .filtro-btn{background:transparent;border:1px solid var(--borda);color:var(--muted);padding:6px 14px;border-radius:20px;font-size:0.78rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;font-family:'Inter',sans-serif;}
  .filtro-btn:hover{border-color:var(--verde-claro);color:var(--verde-claro);}
  .filtro-btn.active{background:var(--verde);border-color:var(--verde);color:#fff;}
  .legenda{display:flex;gap:16px;padding:10px 24px;font-size:0.72rem;color:var(--muted);flex-wrap:wrap;background:var(--fundo);border-bottom:1px solid var(--borda);}
  .legenda-item{display:flex;align-items:center;gap:6px;}
  .legenda-dot{width:10px;height:10px;border-radius:50%;}
  .main{padding:24px;max-width:1400px;margin:0 auto;}
  .grupo-section{margin-bottom:32px;}
  .grupo-titulo{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--amarelo);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--verde);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .grupo-titulo span{font-family:'Inter',sans-serif;font-size:0.7rem;color:var(--muted);font-weight:500;}
  .grupo-resultado{font-family:'Inter',sans-serif;font-size:0.7rem;margin-left:auto;color:var(--verde-claro);font-weight:600;}
  .comparativo{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
  .card-pessoa{background:var(--card);border:1px solid var(--borda);border-radius:10px;overflow:hidden;transition:transform 0.15s;}
  .card-pessoa:hover{transform:translateY(-2px);border-color:var(--verde);}
  .card-header{padding:8px 14px;font-size:0.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:var(--borda);color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
  .card-pts{font-size:0.7rem;color:var(--amarelo);}
  .time-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--borda);font-size:0.82rem;}
  .time-item:last-child{border-bottom:none;}
  .time-item.acerto-pos{background:rgba(18,168,85,0.1);}
  .time-item.acerto-time{background:rgba(245,200,0,0.06);}
  .posicao{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;flex-shrink:0;}
  .pos-1{background:#FFD700;color:#000;}
  .pos-2{background:#C0C0C0;color:#000;}
  .pos-3{background:#CD7F32;color:#fff;}
  .pos-4{background:var(--borda);color:var(--muted);}
  .time-nome{font-weight:500;flex:1;}
  .ponto-badge{font-size:0.65rem;padding:2px 6px;border-radius:4px;font-weight:700;}
  .ponto-2{background:rgba(18,168,85,0.2);color:var(--verde-claro);}
  .ponto-1{background:rgba(245,200,0,0.15);color:var(--amarelo);}
  .em-breve{text-align:center;padding:60px 24px;color:var(--muted);}
  .em-breve .icone{font-size:3rem;margin-bottom:12px;}
  .em-breve h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;color:var(--texto);margin-bottom:8px;}
  .em-breve p{font-size:0.85rem;line-height:1.6;}
  .hidden{display:none;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--verde);color:#fff;padding:10px 20px;border-radius:20px;font-size:0.8rem;font-weight:600;transition:transform 0.3s;z-index:999;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <h1>⚽ Bolão Copa do Mundo 2026</h1>
  <p>Fase de Grupos</p>
  <div class="header-actions">
    <div class="badge">Daniel</div>
    <div class="badge">João</div>
    <div class="badge">Mario</div>
    <div class="badge">Thiagão</div>
    <button class="btn-reload" onclick="carregarSheets()">
      <span id="reload-icon">↻</span> Atualizar resultados
    </button>
  </div>
</header>
<div class="status-bar" id="status-bar">Carregando resultados da planilha...</div>

<div class="abas">
  <button class="aba-btn active" onclick="trocarAba('grupos',this)">📋 Fase de Grupos</button>
  <button class="aba-btn" onclick="trocarAba('placar',this)">🏆 Placar Geral</button>
  <button class="aba-btn" onclick="trocarAba('matamata',this)">⚡ Mata-Mata</button>
</div>

<div id="aba-placar" class="hidden">
  <div style="padding:24px;max-width:600px;margin:0 auto" id="placar-detalhado"></div>
</div>

<div id="aba-grupos">
  <div class="placar-geral" id="placar-geral"></div>
  <div class="legenda">
    <div class="legenda-item"><div class="legenda-dot" style="background:var(--verde-claro)"></div> Acertou time E posição (+2pts)</div>
    <div class="legenda-item"><div class="legenda-dot" style="background:var(--amarelo)"></div> Acertou só o time (+1pt)</div>
    <div class="legenda-item"><div class="legenda-dot" style="background:#FFD700"></div> 1º lugar</div>
    <div class="legenda-item"><div class="legenda-dot" style="background:#C0C0C0"></div> 2º lugar</div>
  </div>
  <div class="filtros" id="filtros-grupos"></div>
  <div class="main" id="conteudo-grupos"></div>
</div>

<div id="aba-matamata" class="hidden">
  <div class="em-breve">
    <div class="icone">🔒</div>
    <h2>Mata-Mata</h2>
    <p>Será liberada após a fase de grupos.<br>Os palpites serão registrados antes das oitavas.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── URL DA PLANILHA (já configurada) ─────────────────────────────────────────
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxPU_QOIi_krzmHVBbpXCNE8kArkftQBgZyXgCIgf7rSOKZCdYPfGOm-xEWx2XskIdGEA/exec';

// ─── PALPITES (fixos) ─────────────────────────────────────────────────────────
const PALPITES = {
  A:{ Breno:["Rep. Tcheca","México","África do Sul","Coreia do Sul"], Daniel:["Coreia do Sul","México","Rep. Tcheca","África do Sul"], João:["México","Rep. Tcheca","Coreia do Sul","África do Sul"], Mario:["México","Coreia do Sul","Rep. Tcheca","África do Sul"], Thiagão:["Tchéquia","México","Coreia do Sul","África do Sul"] },
  B:{ Breno:[], Daniel:["Suíça","Canadá","Bósnia","Catar"], João:["Suíça","Bósnia","Canadá","Catar"], Mario:["Suíça","Canadá","Bósnia","Catar"], Thiagão:["Suíça","Bósnia","Canadá","Catar"] },
  C:{ Breno:[], Daniel:["Brasil","Marrocos","Escócia","Haiti"], João:["Brasil","Marrocos","Escócia","Haiti"], Mario:["Brasil","Marrocos","Escócia","Haiti"], Thiagão:["Brasil","Marrocos","Escócia","Haiti"] },
  D:{ Breno:[], Daniel:["EUA","Turquia","Austrália","Paraguai"], João:["EUA","Paraguai","Turquia","Austrália"], Mario:["Paraguai","Turquia","EUA","Austrália"], Thiagão:["Turquia","Paraguai","EUA","Austrália"] },
  E:{ Breno:[], Daniel:["Alemanha","Costa do Marfim","Equador","Curaçao"], João:["Alemanha","Equador","Costa do Marfim","Curaçao"], Mario:["Alemanha","Equador","Costa do Marfim","Curaçao"], Thiagão:["Equador","Costa do Marfim","Alemanha","Curaçao"] },
  F:{ Breno:[], Daniel:["Holanda","Japão","Suécia","Tunísia"], João:["Holanda","Japão","Suécia","Tunísia"], Mario:["Holanda","Japão","Suécia","Tunísia"], Thiagão:["Holanda","Japão","Tunísia","Suécia"] },
  G:{ Breno:[], Daniel:["Bélgica","Irã","Egito","Nova Zelândia"], João:["Bélgica","Egito","Nova Zelândia","Irã"], Mario:["Bélgica","Egito","Irã","Nova Zelândia"], Thiagão:["Bélgica","Irã","Egito","Nova Zelândia"] },
  H:{ Breno:[], Daniel:["Espanha","Uruguai","Arábia Saudita","Cabo Verde"], João:["Espanha","Uruguai","Arábia Saudita","Cabo Verde"], Mario:["Espanha","Uruguai","Arábia Saudita","Cabo Verde"], Thiagão:["Espanha","Uruguai","Arábia Saudita","Cabo Verde"] },
  I:{ Breno:[], Daniel:["França","Senegal","Noruega","Iraque"], João:["Noruega","França","Senegal","Iraque"], Mario:["França","Noruega","Senegal","Iraque"], Thiagão:["França","Noruega","Senegal","Iraque"] },
  J:{ Breno:[], Daniel:["Argentina","Áustria","Argélia","Jordânia"], João:["Argentina","Áustria","Argélia","Jordânia"], Mario:["Argentina","Áustria","Argélia","Jordânia"], Thiagão:["Argentina","Áustria","Argélia","Jordânia"] },
  K:{ Breno:[], Daniel:["Portugal","Colômbia","Uzbequistão","RD Congo"], João:["Portugal","Colômbia","RD Congo","Uzbequistão"], Mario:["Portugal","Colômbia","Uzbequistão","RD Congo"], Thiagão:["Portugal","Colômbia","RD Congo","Uzbequistão"] },
  L:{ Breno:[], Daniel:["Inglaterra","Croácia","Gana","Panamá"], João:["Croácia","Inglaterra","Gana","Panamá"], Mario:["Inglaterra","Croácia","Gana","Panamá"], Thiagão:["Inglaterra","Croácia","Gana","Panamá"] }
};
const PARTICIPANTES = ["Breno","Daniel","João","Mario","Thiagão"];

// ─── RESULTADOS (alimentados pela planilha) ───────────────────────────────────
let RESULTADOS = {A:{},B:{},C:{},D:{},E:{},F:{},G:{},H:{},I:{},J:{},K:{},L:{}};

// ─── NORMALIZAÇÃO ─────────────────────────────────────────────────────────────
const SINONIMOS = {
  'tchéquia':'Rep. Tcheca','república tcheca':'Rep. Tcheca','rep. tcheca':'Rep. Tcheca',
  'eua':'EUA','estados unidos':'EUA','usa':'EUA',
  'rd congo':'RD Congo','república democrática do congo':'RD Congo',
  'costa do marfim':'Costa do Marfim',"côte d'ivoire":'Costa do Marfim',
};
function norm(n){ if(!n) return ''; return SINONIMOS[n.toLowerCase().trim()] || n.trim(); }

// ─── CARREGAR SHEETS ──────────────────────────────────────────────────────────
async function carregarSheets(){
  const btn = document.querySelector('.btn-reload');
  const icon = document.getElementById('reload-icon');
  btn.classList.add('loading'); icon.textContent='⏳';

  try {
    const res = await fetch(SHEETS_URL, {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    // json já vem no formato { A: {1o: "...", 2o: "..."}, B: {...}, ... }
    Object.entries(json).forEach(([grupo, val]) => {
      if(RESULTADOS[grupo] !== undefined) {
        RESULTADOS[grupo] = { '1o': val['1o']||'', '2o': val['2o']||'' };
      }
    });
    renderTudo();
    document.getElementById('status-bar').textContent = '✅ Atualizado em ' + new Date().toLocaleTimeString('pt-BR');
    mostrarToast('✅ Placar atualizado!');
  } catch(e) {
    document.getElementById('status-bar').textContent = '⚠️ Erro ao carregar planilha: ' + e.message;
    mostrarToast('❌ Erro ao carregar planilha');
    renderTudo();
  }

  btn.classList.remove('loading'); icon.textContent='↻';
}

// ─── PARSEAR CSV ──────────────────────────────────────────────────────────────
// Formato esperado na planilha: Grupo | 1o | 2o
// Ex: A | Brasil | Marrocos
function parsearCSV(csv){
  const linhas = csv.trim().split('\n');
  linhas.forEach(linha => {
    // suporte a vírgula e ponto-e-vírgula como separador
    const cols = linha.split(/[,;]/).map(c => c.trim().replace(/^"|"$/g,''));
    if(cols.length < 3) return;
    const grupo = cols[0].toUpperCase().trim();
    if(!grupo.match(/^[A-L]$/)) return; // ignora cabeçalho
    RESULTADOS[grupo] = { '1o': cols[1]||'', '2o': cols[2]||'' };
  });
}

// ─── PONTUAÇÃO ────────────────────────────────────────────────────────────────
function calcularPontos(palpite, resultado){
  if(!resultado||(!resultado['1o']&&!resultado['2o'])) return {pontos:0,detalhes:[null,null,null,null]};
  const cls = [norm(resultado['1o']), norm(resultado['2o'])].filter(Boolean);
  const det = [null,null,null,null];
  let pts = 0;
  palpite.forEach((time,idx) => {
    // 3º e 4º palpite (idx 2 e 3) nunca pontuam — só 1º e 2º classificam
    if(idx >= 2) return;
    const tn = norm(time);
    const posReal = cls.indexOf(tn);
    if(posReal===-1) return;
    if((posReal===0&&idx===0)||(posReal===1&&idx===1)){ det[idx]='pos'; pts+=2; }
    else { det[idx]='time'; pts+=1; }
  });
  return {pontos:pts, detalhes:det};
}

function placarGeral(){
  const totais={};
  PARTICIPANTES.forEach(p=>totais[p]=0);
  Object.entries(PALPITES).forEach(([g,palpites])=>{
    PARTICIPANTES.forEach(p=>{
      if(!palpites[p]) return;
      totais[p] += calcularPontos(palpites[p], RESULTADOS[g]||{}).pontos;
    });
  });
  return totais;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderTudo(){ renderFiltros(); renderPlacarGeral(); renderGrupos('todos'); renderPlacarDetalhado(); }

function renderFiltros(){
  let html = '<button class="filtro-btn active" onclick="filtrar(\'todos\',this)">Todos</button>';
  Object.keys(PALPITES).forEach(g=>{ html+=`<button class="filtro-btn" onclick="filtrar('${g}',this)">Grupo ${g}</button>`; });
  document.getElementById('filtros-grupos').innerHTML = html;
}

function renderPlacarGeral(){
  const totais = placarGeral();
  const sorted = Object.entries(totais).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1]??0;
  let html = '';
  sorted.forEach(([nome,pts],i)=>{
    const lider = pts===max&&pts>0;
    html+=`<div class="placar-card ${lider?'lider':''}"><div class="nome">${i===0&&pts>0?'🏆 ':''}${nome}</div><div class="pts">${pts}</div><div class="label">pontos</div></div>`;
  });
  document.getElementById('placar-geral').innerHTML = html || '<div style="color:var(--muted);font-size:0.8rem;padding:8px">Aguardando resultados...</div>';
}

function renderPlacarDetalhado(){
  const totais = placarGeral();
  const sorted = Object.entries(totais).sort((a,b)=>b[1]-a[1]);
  let html = '<h2 style="font-family:\'Bebas Neue\',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--amarelo);margin-bottom:20px">Placar Detalhado</h2>';
  sorted.forEach(([nome,total],rank)=>{
    html+=`<div class="card-pessoa" style="margin-bottom:16px"><div class="card-header"><span>${rank===0&&total>0?'🏆 ':''}${nome}</span><span class="card-pts">${total} pts</span></div>`;
    Object.entries(PALPITES).forEach(([g,palpites])=>{
      const p = calcularPontos(palpites[nome]||[], RESULTADOS[g]||{}).pontos;
      html+=`<div class="time-item"><span style="color:var(--muted);font-size:0.75rem;width:70px">Grupo ${g}</span><span style="margin-left:auto;font-weight:600;color:${p>0?'var(--verde-claro)':'var(--muted)'}">${p>0?'+'+p+' pts':'-'}</span></div>`;
    });
    html+='</div>';
  });
  document.getElementById('placar-detalhado').innerHTML = html;
}

function renderGrupos(filtro){
  let html='';
  Object.entries(PALPITES).forEach(([grupo,palpites])=>{
    if(filtro!=='todos'&&filtro!==grupo) return;
    const res = RESULTADOS[grupo]||{};
    const tem = res['1o']||res['2o'];
    const allTimes = [...new Set(Object.values(palpites).flat().map(norm))];
    const resLabel = tem ? `✓ ${res['1o']} · ${res['2o']}` : 'Aguardando resultado';
    html+=`<div class="grupo-section"><div class="grupo-titulo">GRUPO ${grupo} <span>${allTimes.slice(0,4).join(' · ')}</span><span class="grupo-resultado">${resLabel}</span></div><div class="comparativo">`;
    PARTICIPANTES.forEach(pessoa=>{
      const pal = palpites[pessoa]; if(!pal) return;
      const {pontos,detalhes} = calcularPontos(pal, res);
      html+=`<div class="card-pessoa"><div class="card-header"><span>${pessoa}</span>${tem?`<span class="card-pts">${pontos>0?'+'+pontos:'0'} pts</span>`:''}</div>`;
      pal.forEach((time,i)=>{
        const pc=['pos-1','pos-2','pos-3','pos-4'][i];
        const ac=detalhes[i];
        html+=`<div class="time-item ${ac==='pos'?'acerto-pos':ac==='time'?'acerto-time':''}"><div class="posicao ${pc}">${i+1}</div><span class="time-nome">${time}</span>${ac==='pos'?'<span class="ponto-badge ponto-2">+2</span>':''}${ac==='time'?'<span class="ponto-badge ponto-1">+1</span>':''}</div>`;
      });
      html+='</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('conteudo-grupos').innerHTML = html;
}

function filtrar(grupo,btn){
  document.querySelectorAll('#filtros-grupos .filtro-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderGrupos(grupo);
}
function trocarAba(aba,btn){
  document.querySelectorAll('.aba-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['grupos','placar','matamata'].forEach(a=>document.getElementById('aba-'+a).classList.add('hidden'));
  document.getElementById('aba-'+aba).classList.remove('hidden');
}
function mostrarToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Carrega ao abrir
carregarSheets();
</script>
</body>
</html>
